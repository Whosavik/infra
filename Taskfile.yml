version: '3'

dotenv: ['.env']

vars:
  BACKEND_ARGS: >-
    -backend-config="resource_group_name={{.BACKEND_RG}}"
    -backend-config="storage_account_name={{.BACKEND_SA}}"
    -backend-config="container_name={{.BACKEND_CONTAINER}}"

env:
  TF_VAR_backend_rg: "{{.BACKEND_RG}}"
  TF_VAR_backend_sa: "{{.BACKEND_SA}}"
  TF_VAR_backend_container: "{{.BACKEND_CONTAINER}}"

tasks:
  hub:plan:
    desc: "Plan DNS resolver and private DNS zone links in the hub VNet"
    dir: hub
    cmds:
      - tofu init {{.BACKEND_ARGS}} -backend-config="key=hub/terraform.tfstate"
      - tofu plan

  hub:apply:
    desc: "Apply DNS resolver and private DNS zone links in the hub VNet"
    dir: hub
    cmds:
      - tofu init {{.BACKEND_ARGS}} -backend-config="key=hub/terraform.tfstate"
      - tofu apply

  shared:plan:
    desc: "Plan shared resources (ACR, Key Vault)"
    dir: shared
    cmds:
      - tofu init {{.BACKEND_ARGS}} -backend-config="key=shared/terraform.tfstate"
      - tofu plan

  shared:apply:
    desc: "Apply shared resources (ACR, Key Vault)"
    dir: shared
    cmds:
      - tofu init {{.BACKEND_ARGS}} -backend-config="key=shared/terraform.tfstate"
      - tofu apply

  prod:plan:
    desc: "Plan prod AKS cluster and spoke VNet"
    dir: prod
    env:
      TF_VAR_vm_size: "{{.PROD_VM_SIZE}}"
      TF_VAR_min_nodes: "{{.PROD_MIN_NODES}}"
      TF_VAR_max_nodes: "{{.PROD_MAX_NODES}}"
      TF_VAR_vnet_address_space: "{{.TF_VAR_prod_vnet_address_space}}"
      TF_VAR_node_subnet_prefix: "{{.TF_VAR_prod_node_subnet_prefix}}"
      TF_VAR_cluster_subdomain: "{{.PROD_CLUSTER_SUBDOMAIN}}"
      TF_VAR_nginx_ilb_ip: "{{.PROD_NGINX_ILB_IP}}"
    cmds:
      - tofu init {{.BACKEND_ARGS}} -backend-config="key=prod/terraform.tfstate"
      - tofu plan

  prod:apply:
    desc: "Apply prod AKS cluster and spoke VNet"
    dir: prod
    env:
      TF_VAR_vm_size: "{{.PROD_VM_SIZE}}"
      TF_VAR_min_nodes: "{{.PROD_MIN_NODES}}"
      TF_VAR_max_nodes: "{{.PROD_MAX_NODES}}"
      TF_VAR_vnet_address_space: "{{.TF_VAR_prod_vnet_address_space}}"
      TF_VAR_node_subnet_prefix: "{{.TF_VAR_prod_node_subnet_prefix}}"
      TF_VAR_cluster_subdomain: "{{.PROD_CLUSTER_SUBDOMAIN}}"
      TF_VAR_nginx_ilb_ip: "{{.PROD_NGINX_ILB_IP}}"
    cmds:
      - tofu init {{.BACKEND_ARGS}} -backend-config="key=prod/terraform.tfstate"
      - tofu apply

  nonprod:plan:
    desc: "Plan nonprod AKS cluster and spoke VNet"
    dir: nonprod
    env:
      TF_VAR_vm_size: "{{.NONPROD_VM_SIZE}}"
      TF_VAR_min_nodes: "{{.NONPROD_MIN_NODES}}"
      TF_VAR_max_nodes: "{{.NONPROD_MAX_NODES}}"
      TF_VAR_vnet_address_space: "{{.TF_VAR_nonprod_vnet_address_space}}"
      TF_VAR_node_subnet_prefix: "{{.TF_VAR_nonprod_node_subnet_prefix}}"
      TF_VAR_cluster_subdomain: "{{.NONPROD_CLUSTER_SUBDOMAIN}}"
      TF_VAR_nginx_ilb_ip: "{{.NONPROD_NGINX_ILB_IP}}"
    cmds:
      - tofu init {{.BACKEND_ARGS}} -backend-config="key=nonprod/terraform.tfstate"
      - tofu plan

  nonprod:apply:
    desc: "Apply nonprod AKS cluster and spoke VNet"
    dir: nonprod
    env:
      TF_VAR_vm_size: "{{.NONPROD_VM_SIZE}}"
      TF_VAR_min_nodes: "{{.NONPROD_MIN_NODES}}"
      TF_VAR_max_nodes: "{{.NONPROD_MAX_NODES}}"
      TF_VAR_vnet_address_space: "{{.TF_VAR_nonprod_vnet_address_space}}"
      TF_VAR_node_subnet_prefix: "{{.TF_VAR_nonprod_node_subnet_prefix}}"
      TF_VAR_cluster_subdomain: "{{.NONPROD_CLUSTER_SUBDOMAIN}}"
      TF_VAR_nginx_ilb_ip: "{{.NONPROD_NGINX_ILB_IP}}"
    cmds:
      - tofu init {{.BACKEND_ARGS}} -backend-config="key=nonprod/terraform.tfstate"
      - tofu apply

  bootstrap:plan:
    desc: "Plan flux-system namespace and cluster-vars ConfigMap on prod and nonprod"
    dir: bootstrap
    cmds:
      - tofu init {{.BACKEND_ARGS}} -backend-config="key=bootstrap/terraform.tfstate"
      - tofu plan

  bootstrap:apply:
    desc: "Apply flux-system namespace and cluster-vars ConfigMap on prod and nonprod"
    dir: bootstrap
    cmds:
      - tofu init {{.BACKEND_ARGS}} -backend-config="key=bootstrap/terraform.tfstate"
      - tofu apply

  dns:nameservers:
    desc: "Print the NS records to delegate at your registrar"
    cmds:
      - |
        printf "\n================================================================\n"
        printf "DNS delegations to add at your {{.TF_VAR_parent_domain}} registrar\n"
        printf "================================================================\n"
        printf "\n{{.NONPROD_CLUSTER_SUBDOMAIN}}.internal.{{.TF_VAR_parent_domain}}:\n"
        cd nonprod && tofu output zone_nameservers
        printf "\n{{.PROD_CLUSTER_SUBDOMAIN}}.internal.{{.TF_VAR_parent_domain}}:\n"
        cd ../prod && tofu output zone_nameservers
        printf "\n"

  up:
    desc: "Provision everything from scratch (non-interactive): hub → shared → prod → nonprod → bootstrap"
    env:
      TF_CLI_ARGS_apply: "-auto-approve"
    cmds:
      - task: hub:apply
      - task: shared:apply
    # - task: prod:apply
      - task: nonprod:apply
      - task: bootstrap:apply
      - task: dns:nameservers

  nonprod:destroy:
    desc: "Destroy the nonprod AKS cluster (does not touch prod or shared resources)"
    prompt: "This will destroy the nonprod cluster and its spoke VNet. Continue?"
    dir: nonprod
    env:
      TF_VAR_vm_size: "{{.NONPROD_VM_SIZE}}"
      TF_VAR_min_nodes: "{{.NONPROD_MIN_NODES}}"
      TF_VAR_max_nodes: "{{.NONPROD_MAX_NODES}}"
      TF_VAR_vnet_address_space: "{{.TF_VAR_nonprod_vnet_address_space}}"
      TF_VAR_node_subnet_prefix: "{{.TF_VAR_nonprod_node_subnet_prefix}}"
      TF_VAR_cluster_subdomain: "{{.NONPROD_CLUSTER_SUBDOMAIN}}"
      TF_VAR_nginx_ilb_ip: "{{.NONPROD_NGINX_ILB_IP}}"
    cmds:
      - tofu init {{.BACKEND_ARGS}} -backend-config="key=nonprod/terraform.tfstate"
      - tofu destroy

  prod:destroy:
    desc: "Destroy the prod AKS cluster"
    prompt: "This will destroy the prod cluster and its spoke VNet. Continue?"
    dir: prod
    env:
      TF_VAR_vm_size: "{{.PROD_VM_SIZE}}"
      TF_VAR_min_nodes: "{{.PROD_MIN_NODES}}"
      TF_VAR_max_nodes: "{{.PROD_MAX_NODES}}"
      TF_VAR_vnet_address_space: "{{.TF_VAR_prod_vnet_address_space}}"
      TF_VAR_node_subnet_prefix: "{{.TF_VAR_prod_node_subnet_prefix}}"
      TF_VAR_cluster_subdomain: "{{.PROD_CLUSTER_SUBDOMAIN}}"
      TF_VAR_nginx_ilb_ip: "{{.PROD_NGINX_ILB_IP}}"
    cmds:
      - tofu init {{.BACKEND_ARGS}} -backend-config="key=prod/terraform.tfstate"
      - tofu destroy
